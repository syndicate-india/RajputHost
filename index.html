<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajput Image Hosting</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
    background-image: url("");
    background-size: cover;
    background-position: center;
    background-repeat: no repeat;
}
.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{}
    color:#333;
}
input[type=file]{
    margin:15px 0;
}
button{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
img{
    max-width:100%;
    margin-top:20px;
    border-radius:10px;
}
#result{
    margin-top:15px;
    word-break:break-all;
}
</style>
</head>
<body>

<div class="container">
    <h1>Rajput Image Hosting</h1>
    <p>Upload • Store • Share</p>

    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="uploadImage()">Upload Image</button>

    <div id="result"></div>
</div>

<script>

const API_KEY = "82a8e3fdd94b5c724eec7f4bc5c96b45";

async function uploadImage(){

    const fileInput = document.getElementById("imageInput");

    if(!fileInput.files[0]){
        alert("Please select an image.");
        return;
    }

    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    document.getElementById("result").innerHTML =
    "Uploading...";

    try{

        const response = await fetch(
        `https://api.imgbb.com/1/upload?key=${"82a8e3fdd94b5c724eec7f4bc5c96b45"}`,
        {
            method:"POST",
            body:formData
        });

        const data = await response.json();

        if(data.success){

            const imageUrl = data.data.url;

            document.getElementById("result").innerHTML = `
            <img src="${imageUrl}">
            <br><br>
            <input type="text" value="${imageUrl}" id="imgLink" style="width:100%;">
            <br><br>
            <button onclick="copyLink()">Copy Link</button>
            `;
        }
        else{
            document.getElementById("result").innerHTML =
            "Upload failed!";
        }

    }catch(err){
        document.getElementById("result").innerHTML =
        "Error uploading image.";
    }
}

function copyLink(){
    const copyText =
    document.getElementById("imgLink");

    copyText.select();
    document.execCommand("copy");

    alert("Image link copied!");
}

</script>

</body>
</html>
